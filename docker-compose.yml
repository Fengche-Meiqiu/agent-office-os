services:
  office-backend:
    build: ./backend
    container_name: office-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - DEBUG=false
      - PORT=8000
      - WORKERS=1
      - HERMES_URL=${HERMES_URL:-http://host.docker.internal:8001}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - office-data:/app/data
      - office-storage:/app/storage
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: office-nginx
    restart: always
    ports:
      - "${OFFICE_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      office-backend:
        condition: service_healthy
    mem_limit: 128m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  office-data:
  office-storage:
