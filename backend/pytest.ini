# pytest 配置文件
# 小白解释：这是后端测试的配置，告诉 pytest 去哪里找测试文件、用什么参数

[pytest]
# 测试文件所在目录
testpaths = tests
# 测试文件命名规则：test_*.py 或 *_test.py
python_files = test_*.py
# 测试函数命名规则：test_*
python_functions = test_*
# 测试类命名规则：Test*
python_classes = Test*
# 命令行参数：详细输出 + 覆盖率
addopts = -v --tb=short
# 异步测试支持
asyncio_mode = auto
